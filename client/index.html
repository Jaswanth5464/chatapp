<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Chat App</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    <!-- Cropper.js CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.css">
</head>
<body class="bg-light">

    <!-- Auth Container -->
    <div id="auth-view" class="d-flex align-items-center justify-content-center">
        <div class="glass-card p-5 mx-3 w-100" style="max-width: 450px;">
            <div class="text-center mb-4">
                <i class="fa-solid fa-bolt text-white fa-3x mb-3" style="filter: drop-shadow(0 0 10px rgba(255,255,255,0.5));"></i>
                <h2 class="fw-bold mb-0 text-white">Smart Chat</h2>
                <p style="color: rgba(255,255,255,0.7);">Connect instantly.</p>
            </div>
            
            <ul class="nav nav-pills mb-4 justify-content-center gap-2" id="pills-tab" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active px-4 py-2" id="tab-login" data-bs-toggle="pill" data-bs-target="#pills-login" type="button" role="tab" aria-selected="true" style="transition:all 0.2s;">Login</button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link px-4 py-2" id="tab-register" data-bs-toggle="pill" data-bs-target="#pills-register" type="button" role="tab" aria-selected="false" style="transition:all 0.2s;">Register</button>
                </li>
            </ul>
            
            <div class="tab-content" id="pills-tabContent">
                <!-- Login Form -->
                <div class="tab-pane fade show active" id="pills-login" role="tabpanel">
                    <form id="login-form">
                        <div class="mb-3 position-relative">
                            <i class="fa-solid fa-user position-absolute top-50 start-0 translate-middle-y ms-3" style="color: rgba(255,255,255,0.5);"></i>
                            <input type="text" class="form-control form-control-lg ps-5" id="login-username" placeholder="Username" required>
                        </div>
                        <div class="mb-4 position-relative">
                            <i class="fa-solid fa-lock position-absolute top-50 start-0 translate-middle-y ms-3" style="color: rgba(255,255,255,0.5);"></i>
                            <input type="password" class="form-control form-control-lg ps-5" id="login-password" placeholder="Password" required>
                            <i class="fa-solid fa-eye position-absolute top-50 end-0 translate-middle-y me-3 cursor-pointer" id="toggle-login-pass" style="color: rgba(255,255,255,0.5);"></i>
                        </div>
                        <button type="submit" class="btn auth-btn text-white w-100 rounded-pill py-2 fs-5">Login</button>
                    </form>
                </div>
                <!-- Register Form -->
                <div class="tab-pane fade" id="pills-register" role="tabpanel">
                    <form id="register-form">
                        <div class="mb-3 position-relative">
                            <i class="fa-solid fa-user position-absolute top-50 start-0 translate-middle-y ms-3" style="color: rgba(255,255,255,0.5);"></i>
                            <input type="text" class="form-control form-control-lg ps-5" id="reg-username" placeholder="Username" required>
                        </div>
                        <div class="mb-3 position-relative">
                            <i class="fa-solid fa-lock position-absolute top-50 start-0 translate-middle-y ms-3" style="color: rgba(255,255,255,0.5);"></i>
                            <input type="password" class="form-control form-control-lg ps-5" id="reg-password" placeholder="Password" required>
                            <i class="fa-solid fa-eye position-absolute top-50 end-0 translate-middle-y me-3 cursor-pointer" id="toggle-reg-pass" style="color: rgba(255,255,255,0.5);"></i>
                        </div>
                        <div class="mb-4 position-relative">
                            <i class="fa-solid fa-lock position-absolute top-50 start-0 translate-middle-y ms-3" style="color: rgba(255,255,255,0.5);"></i>
                            <input type="password" class="form-control form-control-lg ps-5" id="reg-confirm-password" placeholder="Confirm Password" required>
                            <i class="fa-solid fa-eye position-absolute top-50 end-0 translate-middle-y me-3 cursor-pointer" id="toggle-reg-confirm-pass" style="color: rgba(255,255,255,0.5);"></i>
                        </div>
                        <button type="submit" class="btn auth-btn text-white w-100 rounded-pill py-2 fs-5">Register</button>
                    </form>
                </div>
            </div>
        </div>
    </div>


    <!-- Chat Container -->
    <div id="chat-container" class="container-fluid h-100 d-none">
        <div class="row h-100">
            <!-- Sidebar -->
            <div class="col-12 col-md-4 col-lg-3 bg-white border-end d-flex flex-column p-0 h-100" id="sidebar">
                <div class="p-3 border-bottom d-flex justify-content-between align-items-center bg-light">
                    <div class="d-flex align-items-center" id="profile-btn" data-bs-toggle="modal" data-bs-target="#profileModal" style="cursor: pointer;">
                        <img id="my-profile-pic" src="https://icon-library.com/images/anonymous-avatar-icon/anonymous-avatar-icon-25.jpg" class="rounded-circle me-2 border border-2 border-primary" style="width: 40px; height: 40px; object-fit: cover;" alt="Profile">
                        <h5 class="mb-0 fw-bold" id="my-username">User</h5>
                    </div>
                    <button id="logout-btn" class="btn btn-sm btn-outline-danger rounded-pill" title="Logout" aria-label="Logout"><i class="fa-solid fa-right-from-bracket"></i></button>
                </div>
                
                <!-- Search Bar -->
                <div class="p-2 border-bottom bg-white">
                    <input type="text" class="form-control rounded-pill bg-light border-0" id="user-search" placeholder="Search users...">
                </div>

                <!-- Users List -->
                <div class="flex-grow-1 overflow-auto bg-white" id="users-list">
                    <!-- Dynamic users will be injected here -->
                    <div class="text-center mt-4 text-muted"><div class="spinner-border spinner-border-sm"></div> Loading...</div>
                </div>
            </div>

            <!-- Main Chat Area -->
            <div class="col-12 col-md-8 col-lg-9 d-flex flex-column p-0 h-100 bg-chat">
                
                <!-- Chat Header -->
                <div class="p-3 border-bottom bg-white shadow-sm d-flex justify-content-between align-items-center" id="chat-header">
                    <div class="d-flex align-items-center">
                        <button class="btn btn-sm btn-light d-md-none me-2" id="back-btn" title="Back" aria-label="Back"><i class="fa-solid fa-arrow-left"></i></button>
                        <h5 class="mb-0 fw-bold" id="current-chat-name">Select a user to chat</h5>
                    </div>
                    <div>
                        <span id="typing-indicator" class="badge bg-light text-dark text-lowercase d-none me-2">typing...</span>
                        <button id="voice-call-btn" class="btn btn-sm btn-light d-none rounded-circle me-1" title="Voice Call" aria-label="Voice Call"><i class="fa-solid fa-phone text-success"></i></button>
                        <button id="video-call-btn" class="btn btn-sm btn-light d-none rounded-circle" title="Video Call" aria-label="Video Call"><i class="fa-solid fa-video text-primary"></i></button>
                    </div>
                </div>

                <!-- Chat Messages -->
                <div class="flex-grow-1 p-4 overflow-auto d-flex flex-column" id="chat-messages">
                    <div class="text-center text-muted mt-5">
                        <i class="fa-regular fa-comment-dots fa-3x mb-3 opacity-50"></i>
                        <p>No messages yet. Start the conversation!</p>
                    </div>
                </div>

                <!-- Chat Input -->
                <div class="p-3 bg-white border-top position-relative">
                    <!-- Smart Reply Container -->
                    <div id="smart-replies" class="mb-2 d-none">
                        <!-- Chips injected via JS -->
                    </div>
                    
                    <!-- Emoji Picker -->
                    <div id="emoji-picker" class="d-none position-absolute bg-white border rounded shadow p-2" style="bottom: 70px; left: 15px; width: 300px; max-height: 200px; overflow-y: auto; z-index: 1000;">
                        <!-- Emojis injected via JS -->
                    </div>

                    <form id="message-form" class="d-flex align-items-center gap-2">
                        <button type="button" class="btn btn-light rounded-circle" id="emoji-btn" title="Emojis" aria-label="Emojis">
                            <i class="fa-regular fa-face-smile text-muted fa-lg"></i>
                        </button>
                        <input type="file" id="media-input" class="d-none" accept="image/*,video/*" title="Select media to upload">
                        <button type="button" class="btn btn-light rounded-circle" id="attach-btn" title="Attach Media" aria-label="Attach Media">
                            <i class="fa-solid fa-paperclip text-muted fa-lg"></i>
                        </button>
                        <input type="text" class="form-control rounded-pill flex-grow-1 px-3 bg-light border-0" id="message-input" placeholder="Type a message..." autocomplete="off" disabled>
                        <button type="submit" class="btn btn-primary rounded-circle shadow-sm" id="send-btn" title="Send message" aria-label="Send message" disabled>
                            <i class="fa-solid fa-paper-plane"></i>
                        </button>
                    </form>
                </div>

            </div>
        </div>
    </div>

    <!-- Video Call Overlay -->
    <div id="video-call-overlay" class="d-none position-fixed top-0 start-0 w-100 h-100 bg-dark z-3 d-flex justify-content-center align-items-center flex-column" style="z-index: 1050 !important;">
        <div id="call-ringing-ui" class="text-center text-white mb-4 d-none">
            <div class="ringing-avatar-container mb-3">
                <img id="ring-avatar" src="" class="rounded-circle border border-4 border-primary shadow-lg" style="width: 120px; height: 120px; object-fit: cover;" alt="Caller Profile" title="Caller Profile">
                <div class="pulse-ring"></div>
            </div>
            <h3 id="ring-name" class="fw-bold">Calling...</h3>
            <p id="ring-status" class="text-light opacity-75">Connecting...</p>
        </div>

        <video id="remote-video" autoplay playsinline class="w-100 h-100 border-0" style="object-fit: cover;"></video>
        <video id="local-video" autoplay playsinline muted class="position-absolute bottom-0 end-0 m-4 rounded shadow bg-dark border border-2 border-white" style="width: 150px; height: 200px; object-fit: cover;"></video>
        
        <div class="position-absolute top-0 mt-4 text-white text-center w-100">
            <div id="call-timer" class="fs-4 fw-bold d-none">00:00</div>
        </div>

        <div class="position-absolute bottom-0 mb-5 d-flex gap-3 align-items-center">
            <button id="toggle-mic-btn" class="btn btn-light rounded-circle p-3 shadow" title="Mute Mic"><i class="fa-solid fa-microphone"></i></button>
            <button id="end-call-btn" class="btn btn-danger rounded-circle p-3 shadow-lg mx-2" title="End Call" aria-label="End Call" style="width: 70px; height: 70px;"><i class="fa-solid fa-phone-slash fa-xl"></i></button>
            <button id="toggle-video-btn" class="btn btn-light rounded-circle p-3 shadow" title="Toggle Video"><i class="fa-solid fa-video"></i></button>
        </div>
    </div>

    <!-- Incoming Call Modal Overlay -->
    <div id="incoming-call-modal" class="d-none position-fixed top-0 start-0 w-100 h-100 d-flex justify-content-center align-items-center" style="background: rgba(0,0,0,0.8); z-index: 1060 !important;">
        <div class="bg-white p-4 rounded-4 shadow-lg text-center" style="width: 300px;">
            <div class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center mx-auto mb-3" style="width: 60px; height: 60px; font-size: 2rem;" id="caller-initial">?</div>
            <h4 class="fw-bold mb-1" id="caller-name">User</h4>
            <p class="text-muted mb-4">Incoming Video Call...</p>
            <div class="d-flex justify-content-center gap-4">
                <button id="reject-call-btn" class="btn btn-danger rounded-circle p-3 shadow-sm" title="Reject Call" aria-label="Reject Call"><i class="fa-solid fa-phone-slash fa-lg"></i></button>
                <button id="accept-call-btn" class="btn btn-success rounded-circle p-3 shadow-sm" title="Accept Call" aria-label="Accept Call"><i class="fa-solid fa-phone fa-lg"></i></button>
            </div>
        </div>
    </div>

    <!-- Profile Modal -->
    <div class="modal fade" id="profileModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg rounded-4">
          <div class="modal-header bg-primary text-white text-center border-0 rounded-top-4 py-3">
            <h5 class="modal-title w-100 fw-bold">My Profile</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body p-4 text-center">
            
            <!-- Standard View -->
            <div id="profile-view-area">
                <div class="position-relative d-inline-block mb-3">
                    <img id="modal-profile-pic" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23cbd5e1'><path d='M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z'/></svg>" class="rounded-circle shadow" style="width: 120px; height: 120px; object-fit: cover;">
                    <label for="profile-upload" class="position-absolute bottom-0 end-0 bg-white rounded-circle p-2 shadow cursor-pointer text-primary" style="cursor: pointer;">
                        <i class="fa-solid fa-camera"></i>
                    </label>
                    <input type="file" id="profile-upload" class="d-none" accept="image/*" title="Upload profile picture">
                </div>
                
                <h4 class="fw-bold mb-1" id="modal-username">User</h4>
                <div class="mb-3 text-start mt-4">
                    <label class="form-label text-muted small fw-bold">About / Bio</label>
                    <textarea id="modal-bio" class="form-control" rows="2" placeholder="Available"></textarea>
                </div>
                <button id="save-profile-btn" class="btn btn-primary w-100 rounded-pill py-2 fw-bold">Save Changes</button>
            </div>

            <!-- Cropper View (Hidden by default) -->
            <div id="cropper-area" class="d-none">
                <div style="max-height: 300px; margin-bottom: 1rem; overflow: hidden; display: flex; justify-content: center; background: #eee; border-radius: 8px;">
                    <img id="cropper-image" src="" style="max-width: 100%; display: block;">
                </div>
                <div class="d-flex gap-2">
                    <button id="cancel-crop-btn" class="btn btn-light flex-grow-1 rounded-pill fw-bold">Cancel</button>
                    <button id="save-crop-btn" class="btn btn-primary flex-grow-1 rounded-pill fw-bold">Crop & Upload</button>
                </div>
            </div>

          </div>
        </div>
      </div>
    </div>

    <!-- Bootstrap JS & Socket.io & SimplePeer & Cropper.js -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/simple-peer/9.11.1/simplepeer.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
